# ============================================================
# PostgreSQL Server Configuration
# ============================================================
# Tuned for a general-purpose EC2 instance (2-4 vCPUs, 4-8 GB RAM).
# Adjust values based on your instance size.
# ============================================================

# --- Preloaded Libraries ---
# pg_stat_statements: tracks query execution statistics for performance analysis
shared_preload_libraries = 'pg_stat_statements'

# --- Connection Settings ---
listen_addresses = '*'
port = 5432
max_connections = 200

# --- Memory ---
# Set shared_buffers to ~25% of available RAM
shared_buffers = 1GB
# Set effective_cache_size to ~75% of available RAM
effective_cache_size = 3GB
# Work memory per sort/hash operation
work_mem = 16MB
# Memory for maintenance operations (VACUUM, CREATE INDEX)
maintenance_work_mem = 256MB
# Use huge pages if available (reduces TLB misses for large shared_buffers)
huge_pages = try

# --- Query Plan Caching ---
# Let PostgreSQL auto-decide between generic and custom plans per prepared statement
plan_cache_mode = auto
# pg_stat_statements settings
pg_stat_statements.max = 5000
pg_stat_statements.track = all

# --- Write Ahead Log (WAL) ---
wal_level = replica
max_wal_senders = 5
wal_keep_size = 1GB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
# Increase WAL buffers for write-heavy workloads
wal_buffers = 64MB
# Control WAL file recycling — less aggressive = fewer I/O spikes
min_wal_size = 1GB
max_wal_size = 4GB
# Compress WAL records to reduce I/O and storage
wal_compression = on

# --- Parallelism ---
# Allow parallel sequential scans, hash joins, and index scans
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2
parallel_tuple_cost = 0.01
parallel_setup_cost = 500

# --- Query Planner ---
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# --- Logging ---
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_timezone = 'UTC'

# --- Locale & Encoding ---
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# --- Autovacuum ---
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 60
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
# Trigger vacuum at 5% dead rows instead of the default 20%
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.025
# Make autovacuum run faster (lower delay, higher cost limit)
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 1000
