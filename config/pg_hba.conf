# ============================================================
# PostgreSQL Client Authentication Configuration
# ============================================================
# TYPE  DATABASE    USER        ADDRESS         METHOD
# ============================================================

# "local" is for Unix domain socket connections only
local   all         all                         trust

# IPv4 local connections (container internal)
host    all         all         127.0.0.1/32    scram-sha-256

# IPv6 local connections
host    all         all         ::1/128         scram-sha-256

# Docker network connections (containers talking to each other)
host    all         all         172.16.0.0/12   scram-sha-256

# Allow connections from any IP (secured by password + firewall)
# In production, restrict this to your application's CIDR range.
host    all         all         0.0.0.0/0       scram-sha-256
host    all         all         ::/0            scram-sha-256

# Replication connections (for future read replicas)
host    replication all         0.0.0.0/0       scram-sha-256
